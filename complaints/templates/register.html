{% extends 'base.html' %}
{% block content %}
<h2>Create Account</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>
<p style="text-align:center; margin-top:15px; color:#fbbf24;">
    Already have an account? <a href="{% url 'login' %}" style="color:#3b82f6;">Login here</a>
</p>
{% endblock %}
