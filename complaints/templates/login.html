{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>🔐 Welcome Back</h2>
        <p style="text-align:center; font-size:0.9rem; margin-bottom:15px;">Login to continue 🚀</p>

        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">{{ form.username }}</div>
            <div class="form-group">{{ form.password }}</div>
            <button type="submit">🔓 Login</button>
        </form>

        <div class="auth-footer">
            Don’t have an account?<br>
            <a href="{% url 'register' %}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
